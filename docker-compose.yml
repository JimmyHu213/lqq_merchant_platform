version: '3.8'

services:
  nginx:
    image: nginx:latest
    platform: linux/amd64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./CRMEB_MER-v3.4/:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - crmeb-net

  php:
    platform: linux/amd64
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./CRMEB_MER-v3.4/:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - crmeb-net

  mysql:
    image: mysql:5.7
    platform: linux/amd64
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: crmeb2024
      MYSQL_DATABASE: crmeb_merchant
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./CRMEB_MER-v3.4/install/crmeb_merchant.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - crmeb-net

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - crmeb-net

volumes:
  mysql-data:
  redis-data:

networks:
  crmeb-net:
    driver: bridge
