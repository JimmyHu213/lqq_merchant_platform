version: '3.8'

services:
  mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: mer-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 111111
      MYSQL_DATABASE: java_mer_trip
      MYSQL_USER: java_mer_trip
      MYSQL_PASSWORD: 111111
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./JAVA-MER-2.2_20260225/mer_java/sql/多商户V2.2全量.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --sql-mode=NO_ENGINE_SUBSTITUTION --lower-case-table-names=1
    networks:
      - mer-net

  redis:
    image: redis:6-alpine
    container_name: mer-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass 111111
    volumes:
      - redis-data:/data
    networks:
      - mer-net

volumes:
  mysql-data:
  redis-data:

networks:
  mer-net:
    driver: bridge
